<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  :root {
    --app-bg: #E8F2FF;
    --panel-bg: #FFFFFF;
    --panel-alt: #F6F9FF;
    --border-c: #C6D8EB;
    --text-1: #112C54;
    --text-2: #4A6F9C;
    --text-3: #7C95B2;
    --blue: #1F62B8;
    --blue-bg: #E7F0FF;
    --blue-soft: #D9E6FF;
    --green: #1D7B78;
    --green-bg: #E7F2F2;
    --red: #A72F2F;
    --red-bg: #FFE7E7;
    --radius-sm: 10px;
    --radius-md: 14px;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--app-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border-c)
  }

  #topbar {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border-c);
    padding: 0;
    height: 60px;
    flex-shrink: 0
  }

  .tb-section {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    height: 100%;
    border-right: 1px solid var(--border-c)
  }

  .tb-section:last-child {
    border-right: none;
    margin-left: auto
  }

  .tb-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-right: 2px
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(31, 98, 184, .16);
    background: #F8FBFF;
    color: var(--text-1);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .16s, border-color .16s, transform .16s, box-shadow .16s;
    white-space: nowrap;
    font-family: inherit
  }

  .btn:hover {
    background: var(--blue-soft);
    border-color: var(--blue);
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(31, 98, 184, .08)
  }

  .btn i {
    font-size: 14px;
    color: var(--blue)
  }

  .btn.accent {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue)
  }

  .btn.accent:hover {
    background: #17478f;
    border-color: #17478f
  }

  .btn.accent i {
    color: #fff
  }

  .file-input {
    display: none
  }

  #main {
    display: flex;
    flex: 1;
    min-height: 0
  }

  #sidebar {
    width: 210px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel-bg);
    border-right: 1px solid var(--border-c)
  }

  #sb-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border-c)
  }

  .sb-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 4px
  }

  .sb-hint {
    font-size: 11px;
    color: var(--text-3)
  }

  #eleve-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px
  }

  .ec {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid rgba(31, 98, 184, .14);
    background: var(--panel-alt);
    cursor: grab;
    user-select: none;
    transition: border-color .16s, background .16s, transform .16s, box-shadow .16s
  }

  .ec:hover {
    border-color: var(--blue);
    background: #EEF4FF;
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(31, 98, 184, .06)
  }

  .ec.dragging {
    opacity: .45
  }

  .ec.placed {
    background: var(--green-bg);
    border-color: #88b6a8
  }

  .ec.placed .en {
    color: var(--green)
  }

  .av {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 500;
    flex-shrink: 0
  }

  .en {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-1);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap
  }

  #map-zone {
    flex: 1;
    position: relative
  }

  #map {
    width: 100%;
    height: 100%
  }

  #statusbar {
    height: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 14px;
    background: var(--panel-bg);
    border-top: 1px solid var(--border-c);
    flex-shrink: 0
  }

  .st {
    font-size: 11px;
    color: var(--text-2)
  }

  .st b {
    color: var(--text-1);
    font-weight: 500
  }

  #st-warn {
    display: none;
    font-size: 11px;
    font-weight: 500;
    color: var(--red);
    margin-left: auto;
    display: none;
    align-items: center;
    gap: 4px
  }

  #geocode-bar {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--blue)
  }

  .spin {
    width: 11px;
    height: 11px;
    border: 1.5px solid #ccc;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite
  }

  @keyframes spin {
    to {
      transform: rotate(360deg)
    }
  }

  .toast-wrap {
    position: absolute;
    bottom: 12px;
    right: 12px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none
  }

  .toast {
    background: var(--text-1);
    color: #fff;
    padding: 7px 13px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none
  }

  .toast.danger {
    background: var(--red)
  }

  .toast.show {
    opacity: 1
  }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
    gap: 6px;
    color: var(--text-3);
    font-size: 12px;
    text-align: center
  }

  .empty i {
    font-size: 22px
  }

  .ent-filter-bar {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-c);

    color: var(--text-2);

    padding: 6px 10px;

    font-weight: 600;
    cursor: pointer

    color: #fff;
    border-color: var(--blue)
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 48, 79, .3);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 2000
  }

  .modal-backdrop.open {

  }

  .modal-card {
    width: min(480px, 100%);
    background: #fff;
    border-radius: 18px;
    border: 1px solid var(--border-c);
    box-shadow: 0 18px 48px rgba(15, 48, 79, .16);
    padding: 18px

  .modal-form {
    display: grid;
    gap: 12px;
    margin-top: 10px
  }

  .modal-form label {
    display: grid;
    gap: 6px;
    font-size: 12px;
    color: var(--text-2)
  }

    border-radius: 10px;
    padding: 10px 12px;
    font: inherit;
    color: var(--text-1)
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 6px

  .filter-select {
    border: 1px solid var(--border-c);
    border-radius: 10px;
    padding: 0 10px;
    height: 36px;
    background: #fff;
    color: var(--text-1);

  }

    gap: 8px;
    padding: 10px;

    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;

    gap: 8px;

  .progress-wrap {
    width: 120px;
    height: 8px;
    background: #e7eef8;
    border-radius: 999px;
    overflow: hidden
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--blue), #5aa3ff);
    transition: width .2s ease
  }

  .bad-address-list {
    display: grid;
    gap: 10px;
    max-height: 60vh;
    overflow: auto
  }

  .bad-address-item {
    display: grid;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border-c);
    border-radius: 12px;
    background: var(--panel-alt)
  }

  .bad-address-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-1)
  }

  .bad-address-address {
    font-size: 11px;
    color: var(--text-2)
  }

  .bad-address-input {
    border: 1px solid var(--border-c);
    border-radius: 10px;
    padding: 9px 10px;
    font: inherit;
    color: var(--text-1)
  }

  .pcontent {
    font-family: system-ui, sans-serif;
    min-width: 160px
  }

  .ptitle {
    font-size: 13px;
    font-weight: 600;
    color: #111;
    margin-bottom: 1px
  }

  .psect {
    font-size: 11px;
    color: #888;
    margin-bottom: 2px
  }

  .padr {
    font-size: 10px;
    color: #aaa;
    margin-bottom: 8px
  }

  .pbadge {
    font-size: 11px;
    background: var(--blue-bg);
    color: var(--blue);
    border-radius: 6px;
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    border: 1px solid rgba(31, 98, 184, .16)
  }

  .pbadge .rx {
    cursor: pointer;
    color: #7b91ac;
    font-size: 12px;
    line-height: 1;
    margin-left: 6px;
    padding: 0 2px
  }

  .pbadge .rx:hover {
    color: var(--red)
  }

  .pdrop {
    border: 1.5px dashed rgba(31, 98, 184, .3);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    color: #5d748f;
    margin-top: 8px;
    background: #f9fbff
  }

  .pdrop.ov,
  .leaflet-marker-icon.ov {
    border-color: var(--blue);
    background: #e7f0ff;
    color: var(--blue)
  }

  .leaflet-marker-icon.ov {
    transform: none !important;
    z-index: 1001 !important;
    box-shadow: none !important;
  }

  .pwarn {
    background: #fff3f3;
    color: var(--red);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    margin-bottom: 8px;
    border: 1px solid rgba(179, 47, 47, .16)
  }

  .csv-note {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(15, 48, 79, .28);
    z-index: 1001;
    padding: 20px
  }

  .csv-note-card {
    max-width: 560px;
    width: 100%;
    background: #f8fbff;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 22px 48px rgba(15, 48, 79, .16);
    border: 1px solid rgba(31, 98, 184, .14)
  }

  .csv-note-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px
  }

  .csv-note-body {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.6
  }

  .csv-note-body p {
    margin: 0 0 10px
  }
</style>

<script>
  let eleves = [], ents = [], aff = {}, markers = {}, map, drag = null, busLayer = null, activeMetierFilter = 'all', highlightedEntId = null;
  const GTFS_DATASET_ID = '66ab9b746eaa9c29b082df91';
  const GTFS_SHAPES_URL = `https://app.pysae.com/api/v2/groups/keolis-9cc4/gtfs/${GTFS_DATASET_ID}/shapes`;
  const GTFS_ROUTES_URL = `https://app.pysae.com/api/v2/groups/keolis-9cc4/gtfs/${GTFS_DATASET_ID}/routes`;

  async function loadRubanLines() {
    const [shapesRes, routesRes] = await Promise.all([
      fetch(GTFS_SHAPES_URL, { cache: 'no-store' }),
      fetch(GTFS_ROUTES_URL, { cache: 'no-store' })
    ]);
    if (!shapesRes.ok || !routesRes.ok) throw new Error('GTFS fetch failed');
    const shapes = await shapesRes.json();
    const routes = await routesRes.json();
    const routeMap = Object.fromEntries((routes || []).map(r => [String(r.route_id), r]));
    return (shapes || []).map(shape => ({
      ...shape,
      routeMeta: (shape.routes || []).map(routeId => routeMap[String(routeId)]).filter(Boolean)
    }));
  }
  const C = ["#4D7FDB", "#2B80C9", "#1F62B8", "#1765A8", "#0D5090", "#265D96", "#3779AC", "#4F8EC0", "#6A9DD1", "#84B0E2"];

  const csvNoteTexts = {

  function detectSeparator(sample) {
    return [';', '\t', ',', '|'].reduce((best, sep) => {
      const count = sample.split(sep).length;
      return count > best.count ? { sep, count } : best;
    }, { sep: ';', count: 0 }).sep;
  }
  function splitCsvLine(line, sep) {
    const cells = [];
    let cell = '';
    let inQuote = false;
    let quoteChar = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (!inQuote && (ch === '"' || ch === "'")) {
        inQuote = true;
        quoteChar = ch;
        continue;
      }
      if (inQuote && ch === quoteChar) {
        if (line[i + 1] === quoteChar) {
          cell += quoteChar;
          i++;
        } else {
          inQuote = false;
        }
        continue;
      }
      if (!inQuote && ch === sep) {
        cells.push(cell.trim().replace(/^['"]|['"]$/g, ''));
        cell = '';
        continue;
      }
      cell += ch;
    }
    cells.push(cell.trim().replace(/^['"]|['"]$/g, ''));
    return cells;
  }
  function guessAddressCell(cells, ignoreIndexes = []) {
    const addressKeywords = /\b(rue|avenue|boulevard|bd|impasse|all[eÃĐ]e|place|cours|chemin|route|voie|quai|lotissement|rÃĐsidence|residence|zone|parc|batiment|bÃĒtiment)\b/i;
    let best = '';
    let bestScore = -1;
    cells.forEach((value, idx) => {
      if (ignoreIndexes.includes(idx) || !value) return;
      let score = 0;
      if (addressKeywords.test(value)) score += 4;
      if (/\d/.test(value)) score += 2;
      if (/[a-zA-Z]/.test(value) && /\d/.test(value)) score += 1;
      score += Math.min(2, value.length / 30);
      if (score > bestScore) {
        bestScore = score;
        best = value;
      }
    });
    return best;
  }

  function hashString(value) {

  function getMarkerPositionMap(visibleEnts) {
    const positions = {};
    if (!map || map.getZoom() < 16) {
      visibleEnts.forEach(ent => { positions[ent.id] = { lat: ent.lat, lng: ent.lng }; });
      return positions;
    }
    const clusters = [];
    visibleEnts.forEach(ent => {
      let cluster = clusters.find(c => {
        const dx = (ent.lat - c.centerLat) * 111320;
        const dy = (ent.lng - c.centerLng) * 111320 * Math.cos((c.centerLat * Math.PI) / 180);
        return Math.hypot(dx, dy) <= 28;
      });
      if (!cluster) {
        cluster = { centerLat: ent.lat, centerLng: ent.lng, items: [] };
        clusters.push(cluster);
      }
      cluster.items.push(ent);
      const count = cluster.items.length;
      cluster.centerLat = (cluster.centerLat * (count - 1) + ent.lat) / count;
      cluster.centerLng = (cluster.centerLng * (count - 1) + ent.lng) / count;
    });
    clusters.forEach(cluster => {
      cluster.items.forEach((ent, index) => {
        const count = cluster.items.length;
        const angle = count === 1 ? 0 : (index / count) * Math.PI * 2;
        const radiusMeters = count === 1 ? 0 : 18 + (index % 2 ? 6 : 0);
        const latOffset = (Math.sin(angle) * radiusMeters) / 111320;
        const lngOffset = (Math.cos(angle) * radiusMeters) / (111320 * Math.cos((cluster.centerLat * Math.PI) / 180));
        positions[ent.id] = { lat: cluster.centerLat + latOffset, lng: cluster.centerLng + lngOffset };
      });
    });
    return positions;
  }

  const GEO_CACHE_KEY = 'ent-geocode-cache-v1';
  const GEO_CONCURRENCY = 4;

  function loadGeocodeCache() {
    try {
      const raw = localStorage.getItem(GEO_CACHE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveGeocodeCache(cache) {
    try {
      localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(cache));
    } catch (e) { }
  }

  const geocodeCache = loadGeocodeCache();

  function normalizeGeocodeKey(addr) {
    return String(addr || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ');
  }

  async function geocode(addr) {
    const key = normalizeGeocodeKey(addr);
    if (!key) return null;
    if (geocodeCache[key]) return geocodeCache[key];

    const providers = [
      {
        url: `https://photon.komoot.io/api/?q=${encodeURIComponent(addr)}&limit=1&lang=fr`,
        parse: (d) => {
          const feature = d && d.features && d.features[0];
          const coords = feature && feature.geometry && feature.geometry.coordinates;
          return coords && coords[1] != null && coords[0] != null ? { lat: coords[1], lng: coords[0] } : null;
        }
      },
      {
        url: `https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&countrycodes=fr&q=${encodeURIComponent(addr)}`,
        parse: (d) => d && d[0] ? { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } : null
      }
    ];

    for (const provider of providers) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 7000);
        const r = await fetch(provider.url, { headers: { 'Accept-Language': 'fr' }, signal: controller.signal });
        clearTimeout(timeout);
        if (!r.ok) continue;
        const d = await r.json();
        const result = provider.parse(d);
        if (result) {
          geocodeCache[key] = result;
          saveGeocodeCache(geocodeCache);
          return result;
        }
      } catch (e) { }
    }
    return null;
  }

  async function geocodeAll(liste) {
    const bar = document.getElementById('geocode-bar');
    bar.style.display = 'flex';
    updateGeocodeProgress(0, liste.length, 'PrÃĐparation du gÃĐocodageâĶ');
    let err = 0;
    let done = 0;
    let index = 0;
    const total = liste.length;
    const workers = Array.from({ length: Math.min(GEO_CONCURRENCY, Math.max(1, total)) }, async () => {
      while (index < total) {
        const currentIndex = index++;
        const e = liste[currentIndex];
        if (!e.lat) {
          const c = await geocode(e.adresse);
          if (c) { e.lat = c.lat; e.lng = c.lng; } else { e.err = true; err++; }
        }
        done += 1;
        updateGeocodeProgress(done, total, `GÃĐocodage ${done}/${total}`);
      }
    });
    await Promise.all(workers);
    bar.style.display = 'none';
    if (err) { const el = document.getElementById('s-geo-err'); el.style.display = ''; el.textContent = `${err} adresse(s) non trouvÃĐe(s)`; }
    return liste;
  }

      if (!el) return;
      el.addEventListener('dragenter', e => { e.preventDefault(); el.classList.add('ov'); });
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('ov'); });
      el.addEventListener('dragleave', () => el.classList.remove('ov'));
      el.addEventListener('drop', e => {
        e.preventDefault(); el.classList.remove('ov');
        assignStudentToEnt(ent.id);
      });
    });
    m.addTo(map);
    markers[ent.id] = m;
  }

  async function toggleBusLines() {
    if (!map) initMap();
    if (busLayer) {
      map.removeLayer(busLayer);
      busLayer = null;
      toast('Lignes de bus masquÃĐes');
      return;
    }
    try {
      const shapes = await loadRubanLines();
      if (!shapes.length) {
        toast('Aucune gÃĐomÃĐtrie de ligne Ruban disponible');
        return;
      }
      const group = L.layerGroup();
      const bounds = [];
      shapes.forEach(shape => {
        const coords = (shape.geometry && shape.geometry.coordinates || []).map(([lng, lat]) => [lat, lng]);
        if (coords.length < 2) return;
        const routeLabel = (shape.routes || []).join(', ');
        const routeMeta = (shape.routeMeta || []).find(Boolean);
        const color = routeMeta && routeMeta.route_color ? `#${routeMeta.route_color}` : '#D32F2F';
        const line = L.polyline(coords, { color, weight: 4, opacity: 0.85, lineCap: 'round', lineJoin: 'round' });
        line.bindTooltip(routeLabel || 'Ligne Ruban', { sticky: true });
        line.addTo(group);
        coords.forEach(([lat, lng]) => bounds.push([lat, lng]));
      });
      if (bounds.length) map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
      busLayer = group.addTo(map);
      toast(`${shapes.length} gÃĐomÃĐtries de ligne Ruban affichÃĐes`);
    } catch (err) {
      console.error(err);
      toast('Impossible de charger les gÃĐomÃĐtries Ruban', true);
    }
  }

  function renderPopupHtml(ent) {
    const a = aff[ent.id] || [];
    const over = a.length > 2;
    const metierLabel = getEntMetierLabel(ent);
    return `<div class="pcontent">
    <div class="ptitle">${ent.nom}</div>
    ${metierLabel ? `<div class="psect">${metierLabel}</div>` : ''}
    <div class="padr"><i class="ti ti-map-pin" style="font-size:10px"></i> ${ent.adresse || ''}</div>
    ${over ? `<div class="pwarn"><i class="ti ti-alert-triangle"></i> Plus de 2 ÃĐlÃĻves affectÃĐs</div>` : ''}
    <div id="pp-${ent.id}">${a.map(el => `<div class="pbadge"><span>${el.nom}</span><span class="rx" data-e="${ent.id}" data-u="${el.id}">Ã</span></div>`).join('')}</div>
    <div class="pdrop" id="pd-${ent.id}"><i class="ti ti-drag-drop" style="font-size:13px"></i> DÃĐposer un ÃĐlÃĻve</div>
  </div>`;
  }

  function bindPopupEvents(ent, m) {
    setTimeout(() => {
      document.querySelectorAll('.rx').forEach(btn => {
        if (btn.dataset.bound === '1') return;
        btn.dataset.bound = '1';
        btn.addEventListener('click', () => {
          const eid = parseInt(btn.dataset.e), uid = parseInt(btn.dataset.u);
          aff[eid] = (aff[eid] || []).filter(x => x.id !== uid);
          if (markers[eid]) {
            markers[eid].setIcon(createMarkerIcon(ents.find(e => e.id === eid)));
            updatePopup(ents.find(e => e.id === eid), markers[eid]);
          }
          renderSidebar();
        });
      });
      const dz = document.getElementById('pd-' + ent.id);
      if (dz && dz.dataset.bound !== '1') {
        dz.dataset.bound = '1';
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('ov'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('ov'));
        dz.addEventListener('drop', e => {
          e.preventDefault(); dz.classList.remove('ov');
          if (!drag) return;
          Object.keys(aff).forEach(k => { aff[k] = (aff[k] || []).filter(x => x.id !== drag.id); });
          if (!(aff[ent.id] || []).some(x => x.id === drag.id)) aff[ent.id].push({ ...drag });
          if (markers[ent.id]) {
            markers[ent.id].setIcon(createMarkerIcon(ent));
            updatePopup(ent, markers[ent.id]);
          }
          renderSidebar();
          if ((aff[ent.id] || []).length > 2) toast('â  ' + ent.nom + ' â plus de 2 ÃĐlÃĻves', true);
          drag = null;
        });
      }
    }, 80);
  }

  function updatePopup(ent, m) {
    const popup = m.getPopup();
    const wasOpen = popup && popup.isOpen && popup.isOpen();
    if (!popup) {
      m.bindPopup(renderPopupHtml(ent), { maxWidth: 220, minWidth: 170 });
    } else {
      popup.setContent(renderPopupHtml(ent));
    }
    if (wasOpen) m.openPopup();
    bindPopupEvents(ent, m);
  }

  function refreshPopup(ent, m) {
    const popup = m.getPopup();
    if (popup && popup.isOpen && popup.isOpen()) {
      updatePopup(ent, m);
    }
  }

  function assignStudentToEnt(entId) {
    if (!drag) return;
    const existing = Object.keys(aff).find(k => (aff[k] || []).some(x => x.id === drag.id));
    if (existing) {
      aff[existing] = (aff[existing] || []).filter(x => x.id !== drag.id);
    }
    if (!(aff[entId] || []).some(x => x.id === drag.id)) {
      aff[entId] = aff[entId] || [];
      aff[entId].push({ ...drag });
    }
    const ent = ents.find(e => e.id === entId);
    if (markers[entId]) {
      markers[entId].setIcon(createMarkerIcon(ent));
      updatePopup(ent, markers[entId]);
    }
    renderSidebar();
    if ((aff[entId] || []).length > 2) toast('â  ' + ent.nom + ' â plus de 2 ÃĐlÃĻves', true);
    drag = null;
  }

  function openPopup(ent, m) {
    updatePopup(ent, m);
    m.openPopup();
  }

  function updateStats() {
    const p = new Set(Object.values(aff).flat().map(e => e.id));
    document.getElementById('s-aff').textContent = p.size;
    document.getElementById('s-tot').textContent = eleves.length;
    const over = ents.filter(e => (aff[e.id] || []).length > 2);
    const w = document.getElementById('st-warn');
    if (over.length) { w.style.display = 'flex'; document.getElementById('st-warn-txt').textContent = over.length + ' entreprise(s) avec plus de 2 ÃĐlÃĻves'; }
    else w.style.display = 'none';
  }

  function searchAndHighlightEnt() {
    const input = document.getElementById('ent-search-input');
    const query = input ? input.value.trim() : '';
    if (!query) {
      toast('Saisissez un nom dâentreprise', true);
      return;
    }
    const needle = normalizeSearchText(query);
    const ent = ents.find(e => normalizeSearchText(e.nom).includes(needle));
    if (!ent) {
      toast('Entreprise introuvable', true);
      return;
    }
    highlightedEntId = ent.id;
    activeMetierFilter = 'all';
    renderMetierFilters();
    renderMarkers();
    const marker = markers[ent.id];
    if (marker && map) {
      const latLng = marker.getLatLng();
      map.setView([latLng.lat, latLng.lng], Math.max(map.getZoom(), 15), { animate: true });
      setTimeout(() => openPopup(ent, marker), 150);
      toast('Entreprise mise en surbrillance');
    } else {
      toast('Entreprise non gÃĐolocalisÃĐe', true);
    }
  }

  function exportCurrentFormat() {
    const format = document.getElementById('export-format-select').value;
    if (format === 'csv') exportCsv();
    else exportXlsx();
  }

  function exportXlsx() {
    const rows = [['ÃlÃĻve', 'Entreprise', 'MÃĐtier', 'Adresse']];
    Object.entries(aff).forEach(([eid, els]) => {
      const e = ents.find(x => x.id == eid);
      const metier = e ? (getEntMetierLabel(e) || e.secteur || '') : '';
      els.forEach(el => rows.push([el.nom, e ? e.nom : '', metier, e ? e.adresse : '']));
    });
    if (rows.length === 1) { toast('Aucune affectation Ã  exporter'); return; }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 22 }, { wch: 22 }, { wch: 18 }, { wch: 32 }];
    XLSX.utils.book_append_sheet(wb, ws, 'Affectations');
    XLSX.writeFile(wb, 'affectations_stages.xlsx');
    toast('Export Excel tÃĐlÃĐchargÃĐ â ' + (rows.length - 1) + ' ligne(s)');
  }

  function exportCsv() {
    const rows = [['ÃlÃĻve', 'Entreprise', 'MÃĐtier', 'Adresse']];
    Object.entries(aff).forEach(([eid, els]) => {
      const e = ents.find(x => x.id == eid);
      const metier = e ? (getEntMetierLabel(e) || e.secteur || '') : '';
      els.forEach(el => rows.push([el.nom, e ? e.nom : '', metier, e ? e.adresse : '']));
    });
    if (rows.length === 1) { toast('Aucune affectation Ã  exporter'); return; }
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'affectations_stages.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Export CSV tÃĐlÃĐchargÃĐ â ' + (rows.length - 1) + ' ligne(s)');
  }

  function openUnresolvedModal() {
    renderUnresolvedModal();
    const modal = document.getElementById('unresolved-modal');
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
  }

  function closeUnresolvedModal() {
    const modal = document.getElementById('unresolved-modal');
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
  }

  function renderUnresolvedModal() {
    const container = document.getElementById('unresolved-list');
    const unresolved = ents.filter(e => !e.lat);
    if (!unresolved.length) {
      container.innerHTML = '<div class="empty">Aucune adresse non trouvÃĐe.</div>';
      return;
    }
    container.innerHTML = '';
    unresolved.forEach(ent => {
      const item = document.createElement('div');
      item.className = 'bad-address-item';
      const safeAddress = String(ent.adresse || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      item.innerHTML = `
        <div class="bad-address-title">${ent.nom}</div>
        <div class="bad-address-address">${safeAddress}</div>
        <input class="bad-address-input" id="addr-${ent.id}" value="${safeAddress}">
        <div class="modal-actions">
          <button class="btn" type="button" onclick="retryGeocodeForEnt(${ent.id})">VÃĐrifier</button>
        </div>`;
      container.appendChild(item);
    });
  }

  async function retryGeocodeForEnt(entId) {
    const ent = ents.find(e => e.id === entId);
    if (!ent) return;
    const input = document.getElementById('addr-' + entId);
    const adresse = input ? input.value.trim() : '';
    if (!adresse) { toast('Adresse vide', true); return; }
    ent.adresse = adresse;
    delete ent.lat;
    delete ent.lng;
    const coord = await geocode(adresse);
    if (coord) { ent.lat = coord.lat; ent.lng = coord.lng; }
    renderMarkers();
    renderMetierFilters();
    renderUnresolvedModal();
    if (ent.lat && ent.lng) {
      const v = ents.filter(e => e.lat);
      if (v.length && map) map.fitBounds(L.latLngBounds(v.map(e => [e.lat, e.lng])), { padding: [40, 40] });
      toast('Adresse corrigÃĐe');
    } else {
      toast('Adresse toujours non trouvÃĐe', true);
    }
  }

  function toast(msg, danger = false) {
    const t = document.getElementById('toast');
    t.className = 'toast' + (danger ? ' danger' : '');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function handleEntAction(action) {
    switch (action) {
      case 'search':
        openSearchEntModal();
        break;
      case 'add':
        openManualEntModal();
        break;
      case 'filter':
        openFilterEntModal();
        break;
      case 'unresolved':
        openUnresolvedModal();
        break;
    }
  }

  function openSearchEntModal() {
    const modal = document.getElementById('search-ent-modal');
    const form = document.getElementById('search-ent-form');
    form.reset();
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
    document.getElementById('ent-search-input').focus();
  }

  function closeSearchEntModal() {
    const modal = document.getElementById('search-ent-modal');
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
  }

  function submitSearchEnt(ev) {
    ev.preventDefault();
    searchAndHighlightEnt();
    closeSearchEntModal();
  }

  function openFilterEntModal() {
    const modal = document.getElementById('filter-ent-modal');
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
  }

  function closeFilterEntModal() {
    const modal = document.getElementById('filter-ent-modal');
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
  }

  window.addEventListener('DOMContentLoaded', () => {
    initMap();
    renderSidebar();
    updateStats();
    renderMetierFilters();
    document.getElementById('ent-modal').addEventListener('click', closeManualEntModal);
    document.getElementById('unresolved-modal').addEventListener('click', closeUnresolvedModal);
    document.getElementById('search-ent-modal').addEventListener('click', closeSearchEntModal);
    document.getElementById('filter-ent-modal').addEventListener('click', closeFilterEntModal);
  });
</script>
